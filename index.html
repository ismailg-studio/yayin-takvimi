<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irklar Arası Savaş - Evren Takvimi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* INTRO */
.intro{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#000;
animation:introFade 3s ease forwards;
}

.intro h1{
color:#e50914;
font-size:42px;
letter-spacing:3px;
}

.intro p{
color:#aaa;
margin-top:10px;
}

/* 🎵 MÜZİK */
#bgmusic{
display:none;
}

/* INTRO FADE */
@keyframes introFade{
0%{opacity:0;}
30%{opacity:1;}
80%{opacity:1;}
100%{opacity:0; display:none;}
}

/* MAIN */
.main{
opacity:0;
animation:showMain 2s ease forwards;
animation-delay:3s;
}

@keyframes showMain{
to{opacity:1;}
}

header{
background:#111;
padding:25px;
text-align:center;
position:sticky;
top:0;
z-index:10;
}

header h1{
color:#e50914;
font-size:30px;
}

header span{
color:#aaa;
font-size:14px;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:20px;
max-width:1000px;
margin:auto;
}

.stat{
background:#181818;
padding:15px;
border-radius:10px;
text-align:center;
border-left:4px solid #e50914;
}

/* SEZONLAR */
.season{
max-width:1000px;
margin:auto;
padding:10px 20px;
}

.season h2{
background:#e50914;
padding:10px;
border-radius:8px;
text-align:center;
font-size:20px;
margin-bottom:10px;
}

/* CARD */
.card{
background:#181818;
padding:15px;
margin-bottom:10px;
border-radius:10px;
border-left:5px solid #e50914;
transform:translateY(40px);
opacity:0;
animation:fadeUp .6s forwards;
transition:0.3s;
}

/* ✨ HOVER EFEKT */
.card:hover{
transform:scale(1.02);
background:#222;
}

.card:nth-child(2){animation-delay:.1s;}
.card:nth-child(3){animation-delay:.2s;}
.card:nth-child(4){animation-delay:.3s;}
.card:nth-child(5){animation-delay:.4s;}
.card:nth-child(6){animation-delay:.5s;}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

.date{
color:#e50914;
font-weight:bold;
}

/* PERDELER */
.perde{
max-width:1000px;
margin:auto;
padding:10px 20px;
}

.perde h2{
background:#00bfff;
padding:10px;
border-radius:8px;
text-align:center;
}

.perde .card{
border-left:5px solid #00bfff;
}

/* YIL DÖNÜM */
.anniv{
max-width:1000px;
margin:auto;
padding:10px 20px;
}

.anniv h2{
background:gold;
color:black;
padding:10px;
border-radius:8px;
text-align:center;
}

.anniv .card{
border-left:5px solid gold;
}

footer{
text-align:center;
padding:30px;
color:#777;
}

/* 🔊 MÜZİK BUTONU */
.music-btn{
position:fixed;
bottom:20px;
right:20px;
background:#e50914;
color:white;
border:none;
padding:12px 15px;
border-radius:50px;
cursor:pointer;
z-index:999;
}

</style>
</head>

<body>

<!-- 🎵 MÜZİK -->
<audio id="bgmusic" loop>
<source src="muzik.mp3" type="audio/mpeg">
</audio>

<!-- 🔊 MÜZİK BUTON -->
<button class="music-btn" onclick="toggleMusic()">🔊</button>

<!-- INTRO -->
<div class="intro">
<h1>IRKLAR ARASI SAVAŞ</h1>
<p>Evren Açılıyor...</p>
</div>

<!-- MAIN -->
<div class="main">

<header>
<h1>IRKLAR ARASI SAVAŞ</h1>
<span>Yayın Takvimi • Kronoloji • Evren Zaman Çizgisi</span>
</header>

<div class="stats">
<div class="stat">29 Bölüm</div>
<div class="stat">6 Sezon</div>
<div class="stat">2 Perde</div>
<div class="stat">1 Yıl Dönümü</div>
</div>

<!-- (SEZONLAR AYNI KALDI) -->
<!-- SENİN TÜM SEZONLAR BURADA DEĞİŞMEDİ -->

<div class="season">
<h2>SEZON 1 (1-3)</h2>
<div class="card"><div class="date">17.09.2024</div>Bölüm 1</div>
<div class="card"><div class="date">24.09.2024</div>Bölüm 2</div>
<div class="card"><div class="date">11.10.2024</div>Bölüm 3</div>
</div>

<!-- (DEVAMI AYNI) -->

<div class="anniv">
<h2>🏆 YIL DÖNÜMLERİ</h2>
<div class="card"><div class="date">17.09.2025</div>1. Yıl Dönümü</div>
</div>

<footer>
Irklar Arası Savaş • İsmailG Studio
</footer>

</div>

<!-- 🔥 GARANTİ AUTOPLAY + KONTROL -->
<script>
let music = document.getElementById("bgmusic");

document.addEventListener("click", function () {
    music.play();
});

function toggleMusic(){
    if(music.paused){
        music.play();
    } else {
        music.pause();
    }
}
</script>

</body>
</html>
